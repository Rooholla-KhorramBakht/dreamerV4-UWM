# @package _global_
defaults:
 - /tokenizer: /pushT

dual_stream: false
dynamics_ckpt: null 
reload_checkpoint: null
output_dir: checkpoints/dynamics/${now:%Y-%m-%d_%H-%M-%S}
plot_every: 1000
print_every: 100
log_every: 25
save_every: 2000
seed: 42

denoiser:
  dual_stream: false
  num_action_tokens: 1    # Number of tokens for the image or other modalities
  num_latent_tokens: 256      # The number of latent tokens per frame
  num_register_tokens: 4
  context_length: 64          # The context length for the dynamics model
  max_sequence_length: 64      # The maximum temporal horizon of the tokenizer during training
  model_dim: 768              # The dimension of the transformer latents
  latent_dim: 32              # The dimention of the encoder output latents (z)
  n_layers: 6           # Causal tokenizer encoder depth
  n_heads: 12
  n_kv_heads: 12
  dropout_prob: 0.0
  qk_norm: false
  num_noise_levels: 128
  n_actions: 2
  is_causal: true
  latent_attends_action: false
  layer_types: [spatial, temporal, spatial, temporal]

train:
  device: 'cuda:0'
  use_compile: true
  num_epochs: 100
  batch_per_gpu: 4
  long_seq_batch_per_gpu: 4
  long_seq_prob: 0.0
  context_length: 64
  accum_grad_steps: 1
  lr: 1e-4
  num_workers: 12
  lpips_weight: 0.2
  num_training_steps: 1e7
  mixed_precision: false
  enable_fast_matmul: true
  clip_grad_norm: 1.0
  mode_weights:
    policy: 0.0
    video: 0.0
    wm: 1.0
    id: 0.0
    forcing: 0.0
  video_pretraining: false # Set the action to zero in doing video pretraining
  absolute_actions: false # Whether to use absolute actions (actions_abs) instead of relative actions (actions_rel)
  shortcut:
    flow_bias: 0.25   # P(step_index_raw = max_pow2) → forces flow branch. Remaining mass uniform over bootstrap rungs.
    ema_decay: 0.999  # EMA decay for the teacher used in the bootstrap target.

wandb:
  enable: true
  project: "UWM-dynamics"
  run_name: null